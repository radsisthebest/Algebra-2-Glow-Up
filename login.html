<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#7357d6">
  <title>Sign in · Algebra 2 Glow-Up</title>
  <link rel="stylesheet" href="styles.css?v=23">
</head>
<body>
  <main class="auth-gate">
    <div class="auth-card">
      <div class="card-heading">
        <span class="step-dot">🔐</span>
        <div>
          <h2>Sign in to Algebra 2 Glow-Up</h2>
          <p>This page signs you in with Google, then sends you back to the app.</p>
        </div>
      </div>
      <button class="primary wide" id="loginGoogle" type="button">Continue with Google</button>
      <button class="soft wide" id="backHome" type="button">Back to app</button>
      <p class="fine-print" id="loginMessage">No pop-up here — this uses a full page Google sign-in.</p>
    </div>
  </main>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script src="firebase-config.js?v=23"></script>
  <script>
    const message = document.querySelector("#loginMessage");
    const homeUrl = "./index.html?v=23";

    function say(text) {
      message.textContent = text;
    }

    function ready() {
      return window.firebase && window.FIREBASE_CONFIG && !String(window.FIREBASE_CONFIG.apiKey || "").includes("PASTE_");
    }

    if (!ready()) {
      say("Firebase is not configured yet.");
    } else {
      firebase.initializeApp(window.FIREBASE_CONFIG);
      firebase.auth().getRedirectResult().catch(error => say(error.message || "Google sign-in could not finish."));
      firebase.auth().onAuthStateChanged(user => {
        if (user) location.href = homeUrl;
      });
    }

    document.querySelector("#loginGoogle").onclick = async () => {
      try {
        say("Opening Google sign-in...");
        const provider = new firebase.auth.GoogleAuthProvider();
        provider.setCustomParameters({ prompt: "select_account" });
        firebase.auth().signInWithRedirect(provider);
      } catch (error) {
        say(error.message || "Sign-in failed.");
      }
    };

    document.querySelector("#backHome").onclick = () => {
      location.href = homeUrl;
    };
  </script>
</body>
</html>
